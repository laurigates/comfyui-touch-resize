name: Publish to Comfy Registry

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish-node:
    name: Publish custom node to registry
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies and build frontend
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@v1
        with:
          # PAT issued at https://registry.comfy.org/, stored as the
          # REGISTRY_ACCESS_TOKEN repo secret.
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
          # Reuse the workspace the prior step already built. `bun run build`
          # emits web/dist/ (git-ignored, force-shipped via [tool.comfy]
          # includes). Without skip_checkout the action runs its own
          # actions/checkout, wiping web/dist before `comfy node publish`, so the
          # registry tarball ships an empty web/dist and the extension never loads.
          skip_checkout: 'true'
